name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check for skip release
        id: skip
        shell: bash
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -qi '\[skip release\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.skip.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        if: steps.skip.outputs.skip == 'false'
        id: version
        shell: bash
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            # No tags yet — use version from pyproject.toml
            VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          else
            # Increment patch version from latest tag
            BASE="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Set up uv
        if: steps.skip.outputs.skip == 'false'
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        if: steps.skip.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Update pyproject.toml version (build only)
        if: steps.skip.outputs.skip == 'false'
        shell: bash
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml

      - name: Install dependencies
        if: steps.skip.outputs.skip == 'false'
        run: uv sync --all-groups

      - name: Build exe
        if: steps.skip.outputs.skip == 'false'
        run: uv run pyinstaller kirinuki.spec

      - name: Create tag
        if: steps.skip.outputs.skip == 'false'
        shell: bash
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.skip.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/kirinuki.exe
